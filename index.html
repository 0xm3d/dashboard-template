<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Template</title>
    <!-- <link rel="stylesheet" href="css/normalize.css"> -->
    <link rel="stylesheet" href="css/framework.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page d-flex">
        <div class="sidebar bg-white p-20 relative">
                <h3 class="cap relative txt-c mt-0">m3d</h3>
                <ul>
                    <li>
                        <a href="index.html" class="active d-flex align-c fs-14 c-black rad-6 p-10 mb-5">
                            <i class="fa-regular fa-chart-bar fa-fw"></i>
                            <span class="fs-14  cap hide-mo">dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="settings.html" class="d-flex align-c fs-14 c-black rad-6 p-10 mb-5">
                            <i class="fa-solid fa-user-gear fa-fw"></i>
                            <span class="fs-14  cap hide-mo">settings</span>
                        </a>
                    </li>
                    <li>
                        <a href="profile.html" class="d-flex align-c fs-14 c-black rad-6 p-10 mb-5">
                            <i class="fa-regular fa-circle-user fa-fw"></i>
                            <span class="fs-14  cap hide-mo">profile</span>
                        </a>
                    </li>
                    <li>
                        <a href="projects.html" class="d-flex align-c fs-14 c-black rad-6 p-10 mb-5">
                            <i class="fa-solid fa-diagram-project fa-fw"></i>
                            <span class="fs-14  cap hide-mo">projects</span>
                        </a>
                    </li>
                    <li>
                        <a href="courses.html" class="d-flex align-c fs-14 c-black rad-6 p-10 mb-5">
                            <i class="fa-solid fa-graduation-cap fa-fw"></i>
                            <span class="fs-14  cap hide-mo">courses</span>
                        </a>
                    </li>
                    <li>
                        <a href="friends.html" class="d-flex align-c fs-14 c-black rad-6 p-10 mb-5">
                            <i class="fa-solid fa-user-group fa-fw"></i>
                            <span class="fs-14  cap hide-mo">friends</span>
                        </a>
                    </li>
                    <li>
                        <a href="files.html" class="d-flex align-c fs-14 c-black rad-6 p-10 mb-5">
                            <i class="fa-regular fa-file fa-fw"></i>
                            <span class="fs-14  cap hide-mo">files</span>
                        </a>
                    </li>
                    <li>
                        <a href="plans.html" class="d-flex align-c fs-14 c-black rad-6 p-10 mb-5">
                            <i class="fa-regular fa-credit-card fa-fw"></i>
                            <span class="fs-14  cap hide-mo">plans</span>
                        </a>
                    </li>
                </ul>
            </div>
            <div class="content w-full hidden">
                <div class="head bg-white p-15 between-flex ">
                    <div class="search relative">
                        <input class="p-10 rad-10 b-ccc ml-5" type="search" placeholder="Type A Keyword">
                    </div>
                    <div class="icons d-flex align-c">
                        <span class="notif relative">
                            <i class="fa-regular fa-bell fa-lg"></i>
                        </span>
                        <img class="icon-32 ml-15" src="images/avatar.png" alt="profile picture">
                    </div>
                </div>
                <h1 class="relative cap">dashboard</h1>
                <div class="wrapper d-grid gap-20 mr-20 ml-20">
                    <div class="welcome bg-white rad-10 txt-c-mobile block-mobile">
                        <div class="intro p-20 d-flex space-bet bg-eee">
                            <div>
                                <h2 class="cap m-0">welcome</h2>
                                <p class="c-grey cap mt-5">med</p>
                            </div>
                            <img src="images/welcome.png" alt="welcome image" class="hide-mo">
                        </div>
                        <img src="images/avatar.png" alt="profile picture" class="avatar">
                        <div class="body txt-c d-flex p-20 mt-20 mb-20 block-mobile">
                            <div class="cap">med bouhadi <span class="cap c-grey d-block fs-14 mt-10">developer</span></div>
                            <div class="cap">69<span class="cap c-grey d-block fs-14 mt-10">projects</span></div>
                            <div class="cap">$6900<span class="cap c-grey d-block fs-14 mt-10">earned</span></div>
                        </div>
                        <a href="profile.html" class="visit cap d-block fs-14 bg-blue c-white w-fit btn-shape">profile</a>
                    </div>
                    <div class="draft bg-white rad-10 p-20">
                        <div class="intro">
                            <h2 class="cap mb-5 mt-0">quick draft</h2>
                            <p class="cap c-grey mt-0 mb-20">write a draft for your ideas</p>
                        </div>
                        <div class="inputs">
                            <input class=" cap bg-eee rad-6 p-15 mb-20 mt-0 w-full br-0" type="text" name="title" id="title" placeholder="title">
                            <textarea class="cap bg-eee rad-6 p-15 mt-0 mb-20 br-0 w-full" name="idea" id="idea" placeholder="your thought"></textarea>
                        </div>
                        <input class="save cap d-block fs-14 bg-blue c-white br-0 btn-shape" type="submit" value="save">
                    </div>
                    <div class="targets bg-white rad-10 p-20">
                        <h2 class="cap mb-5 mt-0">yearly targets</h2>
                        <p class="cap c-grey mt-0 mb-20">targets of the year</p>
                        <div class="target-row blue d-flex center-flex mb-20">
                            <div class="icon center-flex">
                                <i class="fa-solid fa-dollar-sign c-blue"></i>
                            </div>
                            <div class="details flex-1">
                                <span class="cap c-grey fs-14">money</span>
                                <span class="d-block mt-5 mb-10 bold">$20.000</span>
                                <div class="progress relative">
                                    <span class="bg-blue" style="width: 80%;"></span>
                                </div>
                            </div>
                        </div>
                        <div class="target-row orange d-flex center-flex mb-20">
                            <div class="icon center-flex">
                                <i class="fa-solid fa-code c-orange"></i>
                            </div>
                            <div class="details flex-1">
                                <span class="cap c-grey fs-14">projects</span>
                                <span class="d-block mt-5 mb-10 bold">24</span>
                                <div class="progress relative">
                                    <span class="bg-orange" style="width: 55%;"></span>
                                </div>
                            </div>
                        </div>
                        <div class="target-row green d-flex center-flex">
                            <div class="icon center-flex">
                                <i class="fa-solid fa-user c-green"></i>
                            </div>
                            <div class="details flex-1">
                                <span class="cap c-grey fs-14">team</span>
                                <span class="d-block mt-5 mb-10 bold">12</span>
                                <div class="progress relative">
                                    <span class="bg-green" style="width: 80%;"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>            
    </div>
</body>
</html>
